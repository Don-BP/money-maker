<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Game Resource Shop</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&amp;family=Nunito:wght@700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#facc15", // Gold/Yellow
              "background-light": "#7dd3fc", // Sky blue for background
              "background-dark": "#1e293b",
              "panel-border": "#f97316",
              "panel-bg": "#22c55e",
              "btn-orange": "#fb923c",
              "btn-blue": "#3b82f6",
              "btn-pink": "#ec4899",
            },
            fontFamily: {
              display: ["Fredoka One", "cursive"],
              body: ["Nunito", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "1rem",
              'xl': "2rem",
            },
            boxShadow: {
              'game': '0 4px 0 0 rgba(0, 0, 0, 0.2), inset 0 4px 4px 0 rgba(255, 255, 255, 0.3)',
              'panel': '0 10px 0 0 #ea580c',
            }
          },
        },
      };
    </script>
<style>
      .glossy-overlay {
        background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 100%);
      }
      .bubble-text {
        text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
      }
      .game-btn {
        transition: transform 0.1s ease;
      }
      .game-btn:active {
        transform: translateY(4px);
        box-shadow: none;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4 font-body">
<div class="relative w-full max-w-[390px] aspect-[9/19.5] bg-sky-400 dark:bg-slate-900 rounded-[3rem] border-[8px] border-slate-800 overflow-hidden shadow-2xl flex flex-col">
<div class="p-6 space-y-3">
<div class="flex justify-between gap-4">
<div class="flex-1 h-8 bg-orange-700 rounded-full border-4 border-orange-500 relative flex items-center shadow-inner">
<div class="absolute -left-2 w-10 h-10 bg-pink-500 rounded-full border-4 border-orange-500 flex items-center justify-center z-10 shadow-lg">
<span class="material-icons text-white text-xl">favorite</span>
</div>
<div class="w-3/4 h-full bg-pink-500 rounded-full glossy-overlay ml-6"></div>
</div>
<div class="flex-1 h-8 bg-orange-700 rounded-full border-4 border-orange-500 relative flex items-center shadow-inner">
<div class="absolute -left-2 w-10 h-10 bg-green-500 rounded-full border-4 border-orange-500 flex items-center justify-center z-10 shadow-lg">
<span class="material-icons text-white text-xl">bolt</span>
</div>
<div class="w-1/2 h-full bg-green-500 rounded-full glossy-overlay ml-6"></div>
</div>
</div>
<div class="flex justify-between gap-4">
<div class="flex-1 h-10 bg-blue-900/40 dark:bg-black/40 rounded-full border-2 border-white/30 flex items-center px-1 relative">
<div class="w-8 h-8 bg-yellow-400 rounded-full flex items-center justify-center border-2 border-yellow-600 shadow-md">
<span class="material-icons text-yellow-800 text-sm">monetization_on</span>
</div>
<span class="ml-2 font-display text-white text-sm bubble-text">1,245</span>
<button class="absolute -right-1 w-8 h-8 bg-blue-500 rounded-lg border-2 border-blue-400 shadow-game flex items-center justify-center game-btn">
<span class="material-icons text-white text-xs">add</span>
</button>
</div>
<div class="flex-1 h-10 bg-blue-900/40 dark:bg-black/40 rounded-full border-2 border-white/30 flex items-center px-1 relative">
<div class="w-8 h-8 bg-purple-500 rounded-full flex items-center justify-center border-2 border-purple-700 shadow-md">
<span class="material-icons text-white text-sm">diamond</span>
</div>
<span class="ml-2 font-display text-white text-sm bubble-text">42</span>
<button class="absolute -right-1 w-8 h-8 bg-blue-500 rounded-lg border-2 border-blue-400 shadow-game flex items-center justify-center game-btn">
<span class="material-icons text-white text-xs">add</span>
</button>
</div>
</div>
</div>
<div class="flex-1 flex flex-col items-center justify-center px-4 -mt-10">
<div class="w-full bg-panel-bg dark:bg-emerald-800 border-[10px] border-panel-border rounded-xl shadow-panel p-4 relative">
<div class="absolute -top-10 left-1/2 -translate-x-1/2 w-48 h-12 bg-pink-500 border-4 border-white rounded-2xl flex items-center justify-center shadow-lg">
<span class="font-display text-white text-xl uppercase tracking-wider bubble-text">Resource Shop</span>
</div>
<div class="grid grid-cols-1 gap-4 mt-6">
<div class="flex items-center bg-green-400/30 dark:bg-black/20 rounded-xl p-3 border-2 border-green-600/30">
<div class="w-20 h-20 bg-green-500/40 rounded-xl flex items-center justify-center relative">
<span class="material-icons text-6xl text-yellow-400 drop-shadow-md">shopping_bag</span>
<span class="material-icons absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-orange-600 text-2xl">monetization_on</span>
</div>
<div class="flex-1 ml-4">
<h3 class="font-display text-white text-lg bubble-text">Gold Pack</h3>
<p class="text-white/80 text-xs font-bold">1000 Coins</p>
</div>
<button class="px-6 py-2 bg-pink-500 border-b-4 border-pink-700 rounded-xl font-display text-white shadow-game game-btn">
                            50 <span class="material-icons text-sm align-middle">monetization_on</span>
</button>
</div>
<div class="flex items-center bg-green-400/30 dark:bg-black/20 rounded-xl p-3 border-2 border-green-600/30">
<div class="w-20 h-20 bg-green-500/40 rounded-xl flex items-center justify-center">
<span class="material-icons text-6xl text-orange-800 drop-shadow-md">inventory_2</span>
</div>
<div class="flex-1 ml-4">
<h3 class="font-display text-white text-lg bubble-text">Magic Chest</h3>
<p class="text-white/80 text-xs font-bold">Random Reward</p>
</div>
<button class="px-6 py-2 bg-pink-500 border-b-4 border-pink-700 rounded-xl font-display text-white shadow-game game-btn">
                            100 <span class="material-icons text-sm align-middle">monetization_on</span>
</button>
</div>
<div class="flex items-center bg-green-400/30 dark:bg-black/20 rounded-xl p-3 border-2 border-green-600/30">
<div class="w-20 h-20 bg-green-500/40 rounded-xl flex items-center justify-center">
<span class="material-icons text-6xl text-purple-400 drop-shadow-md">diamond</span>
</div>
<div class="flex-1 ml-4">
<h3 class="font-display text-white text-lg bubble-text">Gems Bundle</h3>
<p class="text-white/80 text-xs font-bold">150 Diamonds</p>
</div>
<button class="px-6 py-2 bg-pink-500 border-b-4 border-pink-700 rounded-xl font-display text-white shadow-game game-btn">
                            150 <span class="material-icons text-sm align-middle">monetization_on</span>
</button>
</div>
</div>
<div class="flex justify-center mt-6">
<button class="w-32 py-3 bg-panel-bg border-[4px] border-panel-border rounded-xl font-display text-white text-2xl shadow-game game-btn relative overflow-hidden group">
<div class="absolute inset-0 bg-white/20 -translate-x-full group-hover:translate-x-full transition-transform duration-500"></div>
                        OK
                    </button>
</div>
</div>
</div>
<div class="p-6 flex justify-around items-end pb-10">
<button class="w-12 h-12 bg-blue-500 border-b-4 border-blue-700 rounded-xl flex items-center justify-center shadow-game game-btn">
<span class="material-icons text-white">home</span>
</button>
<button class="w-14 h-14 bg-orange-400 border-b-4 border-orange-600 rounded-xl flex items-center justify-center shadow-game game-btn">
<span class="material-icons text-white text-3xl">store</span>
</button>
<button class="w-12 h-12 bg-blue-500 border-b-4 border-blue-700 rounded-xl flex items-center justify-center shadow-game game-btn">
<span class="material-icons text-white">settings</span>
</button>
<button class="w-12 h-12 bg-blue-500 border-b-4 border-blue-700 rounded-xl flex items-center justify-center shadow-game game-btn">
<span class="material-icons text-white">person</span>
</button>
</div>
<div class="absolute top-4 right-4 z-50">
<button class="w-10 h-10 bg-white/20 dark:bg-black/20 backdrop-blur-md rounded-full flex items-center justify-center text-white border border-white/30" onclick="document.documentElement.classList.toggle('dark')">
<span class="material-icons dark:hidden">dark_mode</span>
<span class="material-icons hidden dark:block">light_mode</span>
</button>
</div>
</div>

</body></html>
