        function setInput(val) {

            input.value = val;
            input.dispatchEvent(new Event('input', { bubbles: true }));

        function copyToClipboard(id) {
            const text = document.getElementById(id).innerText;
            if (text && text !== '...') {
                navigator.clipboard.writeText(text);
